services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: qto
    volumes:
      - qto-dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD}@db:3306/qto
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  qto-dbdata:
